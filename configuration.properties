# ============================================================
# AI Selenium Recovery - Configuration
# ============================================================

# --- Browser Settings ---
BROWSER=chrome
HEADLESS_MODE=false

# --- Timeouts (seconds) ---
IMPLICIT_TIMEOUT=5
EXPLICIT_TIMEOUT=10
PAGE_LOAD_TIMEOUT=60

# --- Chrome Remote Debugging (required for AI Recovery) ---
# When true, Chrome launches with --remote-debugging-port
# so Playwright MCP can connect to the same browser session
ENABLE_REMOTE_DEBUGGING=true
ENABLE_REMOTE_DEBUGGING_PORT=9222

# --- AI Agent Configuration ---
AGENT_TYPE=GOOGLE_GEMINI
AGENT_MODEL=gemini-2.5-flash
AGENT_MAX_RETRY=2
AGENT_MAX_STEPS=10

# --- Gemini API Key ---
# Get your key from: https://aistudio.google.com/apikey
GEMINI_API_KEY=YOUR_API_KEY_HERE